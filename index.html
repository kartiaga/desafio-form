<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio - Aula Inaugural</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>POSTECH - FULLSTACK</h1>
            <p>Desafio aula inaugural</p>
        </div>
    </header>
    
    <main class="main-container">
        <div class="form-wrapper">
            <form id="groupForm">
                <div class="form-body">
                    <h2 class="form-title">Informações do grupo</h2>
                    <hr class="divider">
                    
                    <div class="form-group">
                        <label for="nome1">Nome</label>
                        <input type="text" id="nome1" name="nome1" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="nome2">Nome</label>
                        <input type="text" id="nome2" name="nome2">
                    </div>
                    
                    <div class="form-group">
                        <label for="nome3">Nome</label>
                        <input type="text" id="nome3" name="nome3">
                    </div>
                    
                    <div class="form-group">
                        <label for="nome4">Nome</label>
                        <input type="text" id="nome4" name="nome4">
                    </div>
                    
                    <div class="form-group">
                        <label for="nome5">Nome</label>
                        <input type="text" id="nome5" name="nome5">
                    </div>
                    
                    <div class="form-group">
                        <label for="historia">História do grupo</label>
                        <textarea id="historia" name="historia" required></textarea>
                    </div>
                </div>
                
                <div class="form-footer">
                    <button type="submit" class="btn-submit">Enviar</button>
                </div>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
